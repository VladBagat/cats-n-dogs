<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cats and Dogs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #controls {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1;
      display: flex;
      gap: 8px;
    }
    #controls button {
      padding: 10px 14px;
      border: 1px solid #666;
      border-radius: 8px;
      background: #1f1f1f;
      color: #fff;
      font: 600 14px/1.2 system-ui, -apple-system, "Segoe UI", sans-serif;
      cursor: pointer;
    }
    #controls button.on {
      border-color: #54d169;
      background: #16361d;
      color: #d5f7dc;
    }
    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="controls">
    <button id="dogs-only" type="button" aria-pressed="false">Dogs only</button>
    <button id="cats-only" type="button" aria-pressed="false">Cats only</button>
    <button id="pugination" type="button" aria-pressed="false">Pugination: OFF</button>
  </div>
  <img id="pet" alt="Random cat or dog image">
  <script>
    const CLICK_COOLDOWN_MS = 500;
    const PUG_FALLBACK_IMAGE = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 640 360%22%3E%3Crect width=%22640%22 height=%22360%22 fill=%22%23111%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 fill=%22%23f2d1a0%22 font-family=%22system-ui,-apple-system,Segoe UI,sans-serif%22 font-size=%2236%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22%3EPug image unavailable%3C/text%3E%3C/svg%3E';
    let lastClickAdvancedAt = 0;
    let isUpdatingPet = false;
    let isPuginationOn = false;
    let onlyDogs = false;
    let onlyCats = false;

    function setPetSource(pet, source) {
      return new Promise((resolve) => {
        const clearHandlers = () => {
          pet.onload = null;
          pet.onerror = null;
        };

        pet.onload = () => {
          clearHandlers();
          resolve();
        };

        pet.onerror = () => {
          clearHandlers();
          resolve();
        };

        pet.src = source;
      });
    }

    async function getDogImageUrl(endpoint) {
      const response = await fetch(endpoint);
      if (!response.ok) {
        throw new Error('Dog API request failed');
      }

      const data = await response.json();
      if (!data || typeof data.message !== 'string') {
        throw new Error('Dog API response is invalid');
      }

      return data.message;
    }

    function getCatImageUrl() {
      return 'https://cataas.com/cat?t=' + Date.now();
    }

    async function updatePet() {
      if (isUpdatingPet) {
        return;
      }

      isUpdatingPet = true;
      const pet = document.getElementById('pet');
      const showPugsOnly = isPuginationOn;

      try {
        if (showPugsOnly) {
          const pugImageUrl = await getDogImageUrl('https://dog.ceo/api/breed/pug/images/random');
          await setPetSource(pet, pugImageUrl);
        } else if (onlyDogs) {
          const dogImageUrl = await getDogImageUrl('https://dog.ceo/api/breeds/image/random');
          await setPetSource(pet, dogImageUrl);
        } else if (onlyCats) {
          await setPetSource(pet, getCatImageUrl());
        } else if (Math.random() < 0.5) {
          await setPetSource(pet, getCatImageUrl());
        } else {
          const dogImageUrl = await getDogImageUrl('https://dog.ceo/api/breeds/image/random');
          await setPetSource(pet, dogImageUrl);
        }
      } catch (error) {
        if (showPugsOnly) {
          await setPetSource(pet, PUG_FALLBACK_IMAGE);
        } else {
          await setPetSource(pet, getCatImageUrl());
        }
      } finally {
        isUpdatingPet = false;
      }
    }

    function renderControlsState() {
      const puginationButton = document.getElementById('pugination');
      const dogsOnlyButton = document.getElementById('dogs-only');
      const catsOnlyButton = document.getElementById('cats-only');
      puginationButton.classList.toggle('on', isPuginationOn);
      puginationButton.setAttribute('aria-pressed', String(isPuginationOn));
      puginationButton.textContent = isPuginationOn ? 'Pugination: ON' : 'Pugination: OFF';
      dogsOnlyButton.classList.toggle('on', onlyDogs);
      dogsOnlyButton.setAttribute('aria-pressed', String(onlyDogs));
      catsOnlyButton.classList.toggle('on', onlyCats);
      catsOnlyButton.setAttribute('aria-pressed', String(onlyCats));
    }

    function advancePetOnClick() {
      if (isUpdatingPet) {
        return;
      }

      const now = Date.now();
      if (now - lastClickAdvancedAt < CLICK_COOLDOWN_MS) {
        return;
      }

      lastClickAdvancedAt = now;
      updatePet();
    }

    updatePet();
    setInterval(updatePet, 5000);
    document.getElementById('pet').addEventListener('click', advancePetOnClick);
    document.getElementById('pugination').addEventListener('click', () => {
      isPuginationOn = !isPuginationOn;
      if (isPuginationOn) {
        onlyDogs = false;
        onlyCats = false;
      }
      renderControlsState();
      updatePet();
    });
    document.getElementById('dogs-only').addEventListener('click', () => {
      onlyDogs = !onlyDogs;
      onlyCats = false;
      if (onlyDogs) {
        isPuginationOn = false;
      }
      renderControlsState();
      updatePet();
    });
    document.getElementById('cats-only').addEventListener('click', () => {
      onlyCats = !onlyCats;
      onlyDogs = false;
      if (onlyCats) {
        isPuginationOn = false;
      }
      renderControlsState();
      updatePet();
    });
    renderControlsState();
  </script>
</body>
</html>
