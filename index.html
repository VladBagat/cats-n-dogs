<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cats and Dogs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <img id="pet" alt="Random cat or dog image">
  <script>
    const CLICK_COOLDOWN_MS = 500;
    let lastClickAdvancedAt = 0;
    let isUpdatingPet = false;

    function setPetSource(pet, source) {
      return new Promise((resolve) => {
        const clearHandlers = () => {
          pet.onload = null;
          pet.onerror = null;
        };

        pet.onload = () => {
          clearHandlers();
          resolve();
        };

        pet.onerror = () => {
          clearHandlers();
          resolve();
        };

        pet.src = source;
      });
    }

    async function updatePet() {
      if (isUpdatingPet) {
        return;
      }

      isUpdatingPet = true;
      const pet = document.getElementById('pet');

      try {
        if (Math.random() < 0.5) {
          await setPetSource(pet, 'https://cataas.com/cat?t=' + Date.now());
        } else {
          const response = await fetch('https://dog.ceo/api/breeds/image/random');
          const data = await response.json();
          await setPetSource(pet, data.message);
        }
      } catch (error) {
        await setPetSource(pet, 'https://cataas.com/cat?t=' + Date.now());
      } finally {
        isUpdatingPet = false;
      }
    }

    function advancePetOnClick() {
      if (isUpdatingPet) {
        return;
      }

      const now = Date.now();
      if (now - lastClickAdvancedAt < CLICK_COOLDOWN_MS) {
        return;
      }

      lastClickAdvancedAt = now;
      updatePet();
    }

    updatePet();
    setInterval(updatePet, 5000);
    document.getElementById('pet').addEventListener('click', advancePetOnClick);
  </script>
</body>
</html>
