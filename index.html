<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cats and Dogs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <img id="pet" alt="Random cat or dog image">
  <script>
    async function updatePet() {
      const pet = document.getElementById('pet');
      if (Math.random() < 0.5) {
        pet.src = 'https://cataas.com/cat?t=' + Date.now();
        return;
      }

      try {
        const response = await fetch('https://dog.ceo/api/breeds/image/random');
        const data = await response.json();
        pet.src = data.message;
      } catch (error) {
        pet.src = 'https://cataas.com/cat?t=' + Date.now();
      }
    }
    updatePet();
    setInterval(updatePet, 5000);
  </script>
</body>
</html>
